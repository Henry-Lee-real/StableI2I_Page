<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StableI2I</title>
  <style>
    :root {
      --bg: #07040d;
      --bg-2: #12081d;
      --purple-1: rgba(125, 82, 255, 0.18);
      --purple-2: rgba(182, 118, 255, 0.10);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.8);
      --muted-2: rgba(255, 255, 255, 0.58);
      --maxw: 1320px;
      --pad-x: clamp(28px, 4vw, 64px);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 26%, var(--purple-1), transparent 26%),
        radial-gradient(circle at 78% 18%, var(--purple-2), transparent 22%),
        linear-gradient(90deg, rgba(92, 48, 185, 0.10), transparent 42%),
        linear-gradient(180deg, #06030a 0%, #0a0611 26%, #12081d 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.34), rgba(0,0,0,0.08));
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(100%, var(--maxw));
      margin: 0 auto;
      padding-left: var(--pad-x);
      padding-right: var(--pad-x);
      position: relative;
      z-index: 1;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 0;
    }

    .hero-inner {
      width: 100%;
      max-width: none;
      padding-left: clamp(32px, 20vw, 22vw);
      padding-right: clamp(28px, 5vw, 64px);
    }

    .hero-copy {
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: min(1120px, 72vw);
    }

    .title {
      margin: 0;
      font-size: clamp(5.8rem, 13vw, 11.2rem);
      line-height: 0.85;
      letter-spacing: -0.085em;
      font-weight: 800;
      text-align: left;
      max-width: 980px;
    }

    .subtitle {
      margin: 32px 0 0;
      max-width: 1100px;
      color: var(--muted);
      font-size: clamp(1.65rem, 2.15vw, 2.5rem)
