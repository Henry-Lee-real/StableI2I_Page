<style>
  .demo-wrap {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 1320px;
    margin: 0 auto;
    text-align: left;
  }

  .demo-loading,
  .demo-error {
    color: #7b8594;
    font-size: 0.98rem;
    line-height: 1.8;
    padding: 14px 0;
  }

  .demo-carousel {
    position: relative;
    overflow: hidden;
    min-height: 700px;
    transition: height 0.28s ease;
  }

  .demo-stage {
    position: relative;
    min-height: 700px;
    transition: height 0.28s ease;
  }

  .demo-case {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transform: translateY(18px);
    transition: opacity 0.45s ease, transform 0.45s ease;
  }

  .demo-case.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .demo-layout {
    --demo-tile-width: minmax(0, 1fr);
    --demo-tile-gap: 18px;
    display: grid;
    grid-template-columns: minmax(260px, 0.95fr) 76px minmax(0, 2fr);
    gap: 26px;
    align-items: start;
    width: 100%;
  }

  .demo-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #98a1af;
    user-select: none;
    align-self: start;
    margin-top: clamp(120px, 14vw, 190px);
    transform: none;
  }

  .demo-input-col,
  .demo-output-col {
    display: flex;
    flex-direction: column;
    gap: 18px;
    text-align: left;
  }

  .demo-input-col {
    width: 100%;
    max-width: 360px;
  }

  .demo-input-card,
  .demo-output-card,
  .demo-prompt,
  .demo-meta {
    background: #f7f9fc;
    border: 1px solid rgba(16, 24, 40, 0.08);
    border-radius: 24px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
  }

  .demo-input-card,
  .demo-output-card {
    padding: 18px;
  }

  .demo-prompt,
  .demo-meta {
    padding: 16px 18px;
    margin-top: 0;
  }

  .demo-image {
    aspect-ratio: 1 / 1;
    width: 100%;
    border-radius: 18px;
    background:
      radial-gradient(circle at 30% 22%, rgba(177,119,255,0.14), transparent 24%),
      radial-gradient(circle at 78% 74%, rgba(123,92,255,0.10), transparent 18%),
      #eef2f8;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 18px;
    color: #1f2937;
    font-size: 1.02rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .demo-image.real {
    padding: 0;
    overflow: hidden;
  }

  .demo-image.real img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .demo-prompt-title {
    font-size: 0.84rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8b95a5;
    margin-bottom: 10px;
  }

  .demo-prompt-text,
  .demo-model-name,
  .demo-detail-grid {
    color: #1f2937;
    text-align: left;
  }

  .demo-prompt-text {
    line-height: 1.8;
    color: #586273;
  }

  .demo-output-grid {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--demo-tile-gap);
    justify-content: stretch;
    align-items: start;
  }

  .demo-output-item {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .demo-model-name {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: #111827;
    text-align: left;
  }

  .demo-score-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: 12px;
    border: 0;
    background: #ffffff;
    color: #111827;
    border: 1px solid rgba(16, 24, 40, 0.08);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 0.96rem;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
  }

  .demo-score-toggle:hover {
    background: #f3f6fb;
  }

  .demo-score-panel {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.28s ease, margin-top 0.28s ease;
    margin-top: 0;
  }

  .demo-score-panel.open {
    grid-template-rows: 1fr;
    margin-top: 12px;
  }

  .demo-score-panel > div {
    overflow: hidden;
  }

  .demo-detail-grid {
    display: grid;
    gap: 10px;
    padding: 14px;
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid rgba(16, 24, 40, 0.08);
    color: #5d6675;
    line-height: 1.7;
    font-size: 0.93rem;
    max-height: 220px;
    overflow-y: auto;
    overscroll-behavior: contain;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.22) transparent;
  }

  .demo-detail-grid strong {
    color: #111827;
    font-weight: 700;
  }

  .demo-detail-grid::-webkit-scrollbar {
    width: 8px;
  }

  .demo-detail-grid::-webkit-scrollbar-track {
    background: transparent;
  }

  .demo-detail-grid::-webkit-scrollbar-thumb {
    background: rgba(17, 24, 39, 0.16);
    border-radius: 999px;
  }

  .demo-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-top: 22px;
    width: 100%;
    text-align: left;
  }

  .demo-nav {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .demo-dot,
  .demo-arrow-btn {
    border: 0;
    background: #edf2f8;
    color: #111827;
    cursor: pointer;
  }

  .demo-arrow-btn {
    border-radius: 999px;
    min-width: 44px;
    min-height: 44px;
    font-size: 1rem;
    font-weight: 700;
  }

  .demo-dot {
    width: 12px;
    height: 12px;
    border-radius: 999px;
    padding: 0;
    opacity: 0.45;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .demo-dot.active {
    opacity: 1;
    transform: scale(1.15);
  }

  .demo-hint {
    color: #8b95a5;
    font-size: 0.92rem;
  }

  @media (max-width: 1180px) {
    .demo-layout {
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .demo-input-col {
      width: min(100%, 360px);
      margin: 0 auto;
    }

    .demo-output-grid {
      width: 100%;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      justify-content: stretch;
    }

    .demo-arrow {
      margin-top: 0;
      transform: rotate(90deg);
      font-size: 2.6rem;
      align-self: center;
    }
  }

  @media (max-width: 820px) {
    .demo-output-grid {
      grid-template-columns: 1fr;
    }

    .demo-carousel,
    .demo-stage {
      min-height: 1080px;
    }

    .demo-detail-grid {
      max-height: 200px;
    }
  }

  @media (max-width: 640px) {
    .demo-carousel,
    .demo-stage {
      min-height: 980px;
    }

    .demo-detail-grid {
      max-height: 180px;
    }
  }
</style>

<div class="demo-wrap" id="stablei2i-demo-root">
  <div class="demo-carousel">
    <div class="demo-stage" id="stablei2i-demo-stage">
      <div class="demo-loading">Loading demo cases from <code>sections/demo.json</code>...</div>
    </div>
  </div>

  <div class="demo-controls">
    <div style="display:flex; gap:10px;">
      <button class="demo-arrow-btn demo-prev" type="button">←</button>
      <button class="demo-arrow-btn demo-next" type="button">→</button>
    </div>

    <div class="demo-nav" id="stablei2i-demo-nav"></div>

    <div class="demo-hint">Auto-play on · hover to pause</div>
  </div>
</div>

<script>
  (function () {
    if (window.StableI2IDemoJSONInitialized) return;
    window.StableI2IDemoJSONInitialized = true;

    const app = {
      base: 'sections/',
      dataFile: 'sections/demo.json',
      root: null,
      stage: null,
      nav: null,
      prevBtn: null,
      nextBtn: null,
      timer: null,
      index: 0,
      cases: [],
      autoMs: 8000,

      init() {
        this.root = document.getElementById('stablei2i-demo-root');
        if (!this.root) return;

        this.stage = document.getElementById('stablei2i-demo-stage');
        this.nav = document.getElementById('stablei2i-demo-nav');
        this.prevBtn = this.root.querySelector('.demo-prev');
        this.nextBtn = this.root.querySelector('.demo-next');

        this.bindBaseEvents();
        this.load();
      },

      bindBaseEvents() {
        this.prevBtn.addEventListener('click', () => this.prev());
        this.nextBtn.addEventListener('click', () => this.next());

        this.root.addEventListener('mouseenter', () => this.stop());
        this.root.addEventListener('mouseleave', () => this.start());

        this.root.addEventListener('click', (e) => {
          const dot = e.target.closest('.demo-dot');
          if (dot) {
            this.set(Number(dot.dataset.index || 0));
            return;
          }

          const btn = e.target.closest('.demo-score-toggle');
          if (btn) {
            const panel = btn.nextElementSibling;
            const icon = btn.querySelector('.demo-score-icon');
            const open = panel.classList.contains('open');

            panel.classList.toggle('open', !open);
            if (icon) icon.textContent = !open ? '−' : '+';

            setTimeout(() => this.syncHeight(), 290);
          }
        });
      },

      resolve(path) {
        if (!path) return '';
        if (/^(https?:|data:|\/)/.test(path)) return path;
        return this.base + String(path).replace(/^\.?\//, '');
      },

      parseJson(text) {
        const data = JSON.parse(text);
        if (!Array.isArray(data)) {
          throw new Error('demo.json must be a JSON array.');
        }
        return data;
      },

      load() {
        fetch(this.dataFile)
          .then((res) => {
            if (!res.ok) throw new Error('Failed to load ' + this.dataFile);
            return res.text();
          })
          .then((text) => {
            this.cases = this.parseJson(text);
            if (!this.cases.length) {
              throw new Error('No demo cases found in JSON.');
            }
            this.render();
            this.set(0);
            this.syncHeight();
            this.start();
          })
          .catch((err) => {
            this.stage.innerHTML =
              '<div class="demo-error">Could not load <code>' +
              this.dataFile +
              '</code>. Please make sure the file exists and contains a valid JSON array.</div>';
            this.nav.innerHTML = '';
            console.error(err);
          });
      },

      renderImage(path, label) {
        if (path) {
          return (
            '<div class="demo-image real"><img src="' +
            this.resolve(path) +
            '" alt="' +
            (label || 'demo image') +
            '"></div>'
          );
        }
        return '<div class="demo-image">' + (label || 'Image') + '</div>';
      },

      renderDetail(prefix, item) {
        return (
          '<div class="demo-detail-grid">' +
            '<div><strong>Semantic Level:</strong> ' + (item['semantic' + prefix] || '') + '</div>' +
            '<div><strong>Structure Level:</strong> ' + (item['structure' + prefix] || '') + '</div>' +
            '<div><strong>Low-level Appearance:</strong> ' + (item['appearance' + prefix] || '') + '</div>' +
            '<div><strong>Semantic Level COT:</strong> ' + (item['semantic_cot' + prefix] || '') + '</div>' +
            '<div><strong>Low-level Appearance COT:</strong> ' + (item['appearance_cot' + prefix] || '') + '</div>' +
          '</div>'
        );
      },

      renderOutput(prefix, item) {
        const idx = prefix.replace(/[^0-9]/g, '');
        const model = item['model' + idx] || ('Model ' + idx);
        const score = item['score' + idx] || '--';
        const image = item['output' + idx] || '';

        return (
          '<div class="demo-output-item">' +
            '<div class="demo-output-card">' + this.renderImage(image, 'Output ' + idx) + '</div>' +
            '<div class="demo-meta">' +
              '<div class="demo-model-name">' + model + '</div>' +
              '<button class="demo-score-toggle" type="button">' +
                '<span>Score: ' + score + '</span>' +
                '<span class="demo-score-icon">+</span>' +
              '</button>' +
              '<div class="demo-score-panel"><div>' + this.renderDetail(idx, item) + '</div></div>' +
            '</div>' +
          '</div>'
        );
      },

      renderCase(item) {
        return (
          '<div class="demo-case">' +
            '<div class="demo-layout">' +
              '<div class="demo-input-col">' +
                '<div class="demo-input-card">' + this.renderImage(item.input, 'Input Image') + '</div>' +
                '<div class="demo-prompt">' +
                  '<div class="demo-prompt-title">Prompt</div>' +
                  '<div class="demo-prompt-text">' + (item.prompt || '') + '</div>' +
                '</div>' +
              '</div>' +
              '<div class="demo-arrow">→</div>' +
              '<div class="demo-output-col">' +
                '<div class="demo-output-grid">' +
                  this.renderOutput('1', item) +
                  this.renderOutput('2', item) +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>'
        );
      },

      render() {
        this.stage.innerHTML = this.cases.map((item) => this.renderCase(item)).join('');
        this.nav.innerHTML = this.cases
          .map((_, idx) => '<button class="demo-dot" type="button" data-index="' + idx + '"></button>')
          .join('');
      },

      set(i) {
        if (!this.cases.length) return;

        this.index = (i + this.cases.length) % this.cases.length;
        const cards = this.stage.querySelectorAll('.demo-case');
        const dots = this.nav.querySelectorAll('.demo-dot');

        cards.forEach((card, idx) => card.classList.toggle('active', idx === this.index));
        dots.forEach((dot, idx) => dot.classList.toggle('active', idx === this.index));

        this.syncHeight();
      },

      syncHeight() {
        const active = this.stage.querySelector('.demo-case.active');
        const carousel = this.root.querySelector('.demo-carousel');
        if (!active || !carousel) return;

        const h = active.offsetHeight;
        this.stage.style.height = h + 'px';
        carousel.style.height = h + 'px';
      },

      next() {
        this.set(this.index + 1);
      },

      prev() {
        this.set(this.index - 1);
      },

      start() {
        if (!this.cases.length) return;
        this.stop();
        this.timer = setInterval(() => this.next(), this.autoMs);
      },

      stop() {
        if (this.timer) {
          clearInterval(this.timer);
          this.timer = null;
        }
      }
    };

    window.StableI2IDemoJSON = app;
    window.addEventListener('resize', () => {
      if (window.StableI2IDemoJSON) {
        window.StableI2IDemoJSON.syncHeight();
      }
    });

    app.init();
  })();
</script>
